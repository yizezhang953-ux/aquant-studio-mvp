app = "aquant-studio-api"
primary_region = "sin"

[build]
  dockerfile = "web_app/deploy/backend.Dockerfile"

[env]
  APP_ENV = "production"
  LIVE_TRADING_ENABLED = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
